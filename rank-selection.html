<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>좌석 선택 순위 지정 - 설정</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="rank.js"></script>
</head>
<body class="page-shell page-rank-settings">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main class="app-frame">
    <section class="hero-card glass">
      <div class="hero-copy">
        <h1>좌석 선택 순위 지정</h1>
        <p class="hero-text hero-text-small">이름 목록을 입력하고 Start를 누르면 10초 동안 섞은 뒤 순위를 알려줍니다.</p>
      </div>
      <a class="hero-visual" href="https://cafe.naver.com/skrtlvkxl" target="_blank" rel="noopener noreferrer" aria-label="네이버 카페로 이동">
        <img src="image/s1.png" alt="">
      </a>
      <div class="hero-badge">
        <span>새 프로그램</span>
        <strong>순위 결과를 독립 화면으로 보여줍니다</strong>
      </div>
      <small class="hero-version">v1.21</small>
    </section>

    <section class="content-grid">
      <form id="rankSettingsForm" class="glass panel settings-panel">
        <div class="panel-head">
          <h2>설정 창</h2>
        </div>

        <label class="field">
          <span>이름 입력</span>
          <textarea id="rankNames" name="rankNames" rows="10" placeholder="철수\n영희\n민수\n준호"></textarea>
          <small>한 줄에 한 명씩 입력하거나 쉼표로 구분해 입력할 수 있습니다.</small>
        </label>

        <div class="settings-footer">
          <p id="formMessage" class="form-message" aria-live="polite"></p>
          <div class="actions">
            <a class="ghost-btn link-btn" href="index.html">홈으로</a>
            <button type="button" id="resetButton" class="ghost-btn">초기화</button>
            <button type="submit" class="primary-btn">Start</button>
          </div>
        </div>
      </form>

      <aside class="glass panel guide-panel">
        <div class="panel-head">
          <h2>규칙</h2>
        </div>

        <div class="rule-list">
          <article class="rule-item">
            <strong>무작위 순위</strong>
            <p>입력한 이름을 10초 동안 섞은 뒤 결과 순위를 보여줍니다.</p>
          </article>
          <article class="rule-item">
            <strong>입력 방식</strong>
            <p>이름은 줄바꿈 또는 쉼표로 구분할 수 있습니다.</p>
          </article>
          <article class="rule-item">
            <strong>독립 저장</strong>
            <p>기존 좌석 배정 프로그램과는 별도 저장 공간을 사용합니다.</p>
          </article>
        </div>

        <div class="tip-card">
          <span>Tip</span>
          <p>입력한 이름은 다음 접속 때 자동 복원됩니다.</p>
        </div>
      </aside>
    </section>
  </main>

  <div id="loadingOverlay" class="loading-overlay" hidden>
    <div class="loading-card glass">
      <div class="hourglass" aria-hidden="true">
        <span class="hourglass-frame"></span>
        <span class="hourglass-sand top"></span>
        <span class="hourglass-sand bottom"></span>
      </div>
      <h2>순위를 섞는 중</h2>
      <p>10초 동안 랜덤 순위를 준비합니다.</p>
      <div class="progress-track"><span class="progress-bar"></span></div>
    </div>
  </div>
</body>
</html>
